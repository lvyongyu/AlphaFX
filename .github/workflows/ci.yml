name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Optional ML extras (xgboost): installed in CI so the xgboost code
          # path is exercised, but kept out of core requirements so the app
          # deploys without it (it falls back to scikit-learn).
          pip install -r requirements-ml.txt
      - name: Run tests
        run: python -m pytest -q
